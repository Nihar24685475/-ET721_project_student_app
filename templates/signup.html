{% extends 'base.html' %}
{% block title %}
Signup
{% endblock %}
{% block content %}

<h1 class="title">Create Account</h1>
<form method="POST" class="form_box">
    <input type="text"
           name="username"
           placeholder="Enter username"
           required>
    <input type="email"
           name="email"
           placeholder="Enter email"
           required>
    <input type="password"
           name="password"
           placeholder="Enter password"
           required>
    <button type="submit">
        Signup
    </button>
</form>
<p class="link_text">
    Already have an account?
    <a href="{{ url_for('login') }}">
        Login
    </a>
</p>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for msg in messages %}
            <p class="flash_msg">{{ msg }}</p>
        {% endfor %}
    {% endif %}
{% endwith %}

{% endblock %}
