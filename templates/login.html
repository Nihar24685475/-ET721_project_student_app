{% extends 'base.html' %}
{% block title %}
Login
{% endblock %}
{% block content %}

<h1 class="title">User Login</h1>
<form method="POST" class="form_box">
    <input type="email"
           name="email"
           placeholder="Enter email"
           required>
    <input type="password"
           name="password"
           placeholder="Enter password"
           required>
    <button type="submit">
        Login
    </button>
</form>
<p class="link_text">
    Don't have an account?
    <a href="{{ url_for('signup') }}">
        Signup
    </a>
</p>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for msg in messages %}
            <p class="flash_msg">{{ msg }}</p>
        {% endfor %}
    {% endif %}
{% endwith %}

{% endblock %}
